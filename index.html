<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Média</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Container centralizado -->
    <div class="d-flex align-items-center justify-content-center min-vh-100 p-3">
        <!-- Bootstrap Card -->
        <div class="card shadow" style="width: 100%; max-width: 450px;">
            <div class="card-body p-4">
                <h2 class="card-title text-center mb-4">Calculadora de Média</h2>
                
                <form id="mediaForm">
                    <!-- Nome do Aluno -->
                    <div class="mb-3">
                        <label for="nomeEstudante" class="form-label">Nome do Aluno</label>
                        <input type="text" class="form-control" id="nomeEstudante" placeholder="Digite o nome" autocomplete="off" required>
                    </div>
                    
                    <!-- Nota 1 -->
                    <div class="mb-3">
                        <label for="nota1" class="form-label">Nota 1</label>
                        <input type="number" class="form-control" id="nota1" min="0" max="10" step="1.0" placeholder="Ex: 8.0" required>
                    </div>
                    
                    <!-- Nota 2 -->
                    <div class="mb-3">
                        <label for="nota2" class="form-label">Nota 2</label>
                        <input type="number" class="form-control" id="nota2" min="0" max="10" step="1.0" placeholder="Ex: 7.0" required>
                    </div>
                    
                    <!-- Botão de Calcular -->
                    <button type="submit" class="btn btn-danger w-100 mt-2" id="btnCalcular">Calcular Média</button>
                </form>
                
                <!-- Exibição do Resultado -->
                <div id="resultContainer" class="mt-4 d-none text-center">
                    <hr>
                    <h4 id="resultText" class="fw-bold"></h4>
                    <p id="resultSituacao" class="fs-5 fw-semibold"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
